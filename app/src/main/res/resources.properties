# Declares the locale of strings in `res/values/` (the unqualified resource directory) so
# AGP's `generateLocaleConfig = true` can emit a correct `locales_config.xml` for Android 13+'s
# per-app language picker. Without this entry AGP fails the `extractDebugSupportedLocales`
# task because it cannot infer the base locale from the folder name alone.
unqualifiedResLocale=en
