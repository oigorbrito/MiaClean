name: PR Risk Summary

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  risk-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract Task Scope
        id: extract_scope
        continue-on-error: true
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # 1. Try to extract from PR body
          SCOPE=$(python3 -c "
import os, re
body = os.environ.get('PR_BODY', '')
match = re.search(r'Task-Scope:\s*(\S+)', body, re.IGNORECASE)
if match:
    print(match.group(1).strip())
          ")

          if [ -n "$SCOPE" ]; then
            echo "Found scope in PR body: $SCOPE"
          else
            # 2. Try to extract from commit messages between base and head
            echo "Task-Scope not found in PR body. Checking commit messages..."
            COMMITS=$(git log --format=%B "$BASE_SHA..$HEAD_SHA")
            SCOPE=$(python3 -c "
import re, sys
commits = sys.stdin.read()
match = re.search(r'Task-Scope:\s*(\S+)', commits, re.IGNORECASE)
if match:
    print(match.group(1).strip())
            " <<< "$COMMITS")

            if [ -n "$SCOPE" ]; then
              echo "Found scope in commit messages: $SCOPE"
            fi
          fi

          if [ -z "$SCOPE" ]; then
            echo "Task-Scope not found."
            exit 1
          fi

          echo "scope=$SCOPE" >> $GITHUB_OUTPUT

      - name: Generate Risk Summary
        id: risk_summary
        if: steps.extract_scope.outcome == 'success'
        continue-on-error: true
        env:
          TASK_SCOPE: ${{ steps.extract_scope.outputs.scope }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ', ') }}
        run: |
          SUMMARY=$(python3 harness/generate_risk_summary.py --scope "$TASK_SCOPE" --base "$BASE_SHA" --head "$HEAD_SHA" --labels "$LABELS")

          # Handle multi-line output for GITHUB_OUTPUT
          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post or Update Risk Summary Comment
        if: steps.risk_summary.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.risk_summary.outputs.summary }}
        with:
          script: |
            const marker = '<!-- mia-clean-risk-summary -->';
            const body = process.env.SUMMARY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => comment.body.includes(marker));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
