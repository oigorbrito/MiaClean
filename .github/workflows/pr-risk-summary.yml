name: PR Risk Summary

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  risk-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract Task Scope
        id: extract_scope
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          SCOPE=$(python3 -c "
          import os, re
          body = os.environ.get('PR_BODY', '')
          match = re.search(r'^\s*Task-Scope:\s*([a-zA-Z0-9_-]+)', body, re.IGNORECASE | re.MULTILINE)
          if match:
              print(match.group(1).strip().lower())
          ")

          if [ -n "$SCOPE" ]; then
            echo "scope=$SCOPE" >> $GITHUB_OUTPUT
            echo "Escopo detectado: $SCOPE"
          else
            echo "::warning::Task-Scope não encontrado no corpo da PR."
          fi

      - name: Generate Risk Summary
        if: steps.extract_scope.outputs.scope != ''
        id: risk_summary
        continue-on-error: true
        env:
          TASK_SCOPE: ${{ steps.extract_scope.outputs.scope }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ', ') }}
        run: |
          SUMMARY=$(python3 harness/generate_risk_summary.py --scope "$TASK_SCOPE" --base "$BASE_SHA" --head "$HEAD_SHA" --labels "$LABELS")

          # Handle multi-line output for GITHUB_OUTPUT
          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post or Update Risk Summary Comment
        if: steps.extract_scope.outputs.scope != '' && steps.risk_summary.outcome == 'success'
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.risk_summary.outputs.summary }}
        with:
          script: |
            const marker = '<!-- mia-clean-risk-summary -->';
            const body = process.env.SUMMARY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => comment.body.includes(marker));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
